[build-system]
requires = ["scikit-build-core>=1.0.0", "cython"]
build-backend = "scikit_build_core.build"

[project]
name = "pybroma"
# remember to bump in __init__.py too!
version = "0.2.0"
authors = [{ name = "Calloc" }]
maintainers = [
    { name = "prevter" },
    { name = "Stazzical" }
]

[project.urls]
Repository = "https://github.com/prevter/PyBroma"
"Parent Project (BromaIDA)" = "https://github.com/Stazzical/BromaIDA"

[tool.scikit-build]
wheel.packages = ["pybroma"]
wheel.install-dir = "pybroma"
ninja.version = ">=1.11"
cmake.version = "CMakeLists.txt"
cmake.build-type = "Release"
sdist.exclude = [".github"]

[[tool.scikit-build.generate]]
path = "pybroma/_version.py"
template = '''
# Auto-generated by scikit-build-core
__version__ = "${version}"
'''
